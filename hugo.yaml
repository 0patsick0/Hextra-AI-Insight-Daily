title: 0patsick0的AI资讯日报 | 精选AI新闻与工具 | 洞悉AI前沿动态

timezone: Asia/Shanghai
enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
hasCJKLanguage: true
enableInlineShortcodes: true

services:
  googleAnalytics:
    ID: ""

outputs:
  home: [html]
  page: [html]
  section: [html, rss]

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - identifier: search
      name: 搜索
      weight: 10
      params:
        type: search
    - identifier: documentation
      name: AI日报
      pageRef: /
      weight: 1
    - identifier: blog
      name: 博客
      pageRef: /blog
      weight: 2
    - identifier: about
      name: 关于我 ↗
      url: "https://github.com/0patsick0"
      weight: 3
    - identifier: github
      name: 同性交友
      weight: 4
      url: "https://github.com/0patsick0/Hextra-AI-Insight-Daily"
      params:
        icon: github

params:
  adsenseId: ""
  umamiKey: ""
  ahrefsKey-del: ""
  description: 个人每日整理的AI资讯站。我们为您过滤信息噪音，只提供最精选的AI新闻、最实用的AI工具与AI教程，助您高效获取人工智能领域的前沿动态
  descriptionEn: Your daily source for curated AI news, practical tools, and actionable tutorials to master Artificial Intelligence;
  logo: "images/logo-dark.png"

  author:
    name: "0patsick0的AI资讯日报 | 精选AI新闻与工具 | 洞悉AI前沿动态"
    bio: "AI 资讯聚合"
    email: ""
    website: "https://0patsick0.github.io/Hextra-AI-Insight-Daily/about/"
    social:
      - name: "GitHub"
        url: "https://github.com/0patsick0"

  publisher:
    type: "Person"
    name: "0patsick0的AI资讯日报 | 精选AI新闻与工具 | 洞悉AI前沿动态"
    url: "https://0patsick0.github.io/Hextra-AI-Insight-Daily/about/"
    sameAs:
      - "https://github.com/0patsick0"

  displayUpdatedDate: true
  dateFormat: "2006/01/02 15:04:05"

  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/logo.png
      dark: images/logo-dark.png
      width: 175
      height: 50

  footer:
    displayCopyright: false
    displayPoweredBy: false

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
      pagerSize: 10
    article:
      displayPagination: true

  toc:
    displayTags: false

  page:
    width: wide

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content

  comments:
    enable: false
    type: giscus
    giscus:
      repo: 0patsick0/Hextra-AI-Insight-Daily
      repoId: R_kgDOO_2Owg
      category: Announcements
      categoryId: DIC_kwDOO_2Ows4Cr2Q0

defaultContentLanguage: zh
languages:
  zh:
    languageCode: zh-CN
    contentDir: content/cn
    languageName: 简体中文
    weight: 1
  en:
    contentDir: content/en
    languageName: English
    title: 0patsick0's AI Daily | AI News | AI Tools | AI Insights
    weight: 2
